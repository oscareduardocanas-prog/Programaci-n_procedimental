<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="../css/inventario.css" />
    <title>Inventario</title>
  </head>
  <body>
  <section class="section">
    <div class="container">
      <h3 class="title is-3">Agregar producto</h3>
      <form>
        <div class="field">
          <label class="label">Nombre del producto</label>
          <div class="control">
            <input id="nombre_producto" class="input" type="text" name="nombre_producto" placeholder="Ingrese el nombre del producto" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Precio</label>
          <div class="control">
            <input id="precio" class="input" type="number" name="precio" placeholder="Ingrese el precio" step="0.01" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Código</label>
          <div class="control">
            <input id="codigo" class="input" type="text" name="codigo" placeholder="Ingrese el código del producto" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Cantidad</label>
          <div class="control">
            <input id="cantidad" class="input" type="number" name="cantidad" placeholder="Ingrese la cantidad" min="1" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Marca</label>
          <div class="control">
            <input id="marca" class="input" type="text" name="marca" placeholder="Ingrese la marca" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Categoría</label>
          <div class="control">
            <input id="categoria" class="input" type="text" name="categoria" placeholder="Ingrese la categoría" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Unidad de medida</label>
          <div class="control">
            <input id="unidad_medida" class="input" type="text" name="unidad_medida" placeholder="Ingrese la unidad de medida" required />
          </div>
        </div>

        <div class="field">
          <div class="control">
            <button class="button is-primary" type="submit">Guardar producto</button>
          </div>
        </div>
      </form>
    </div>
  </section>
  <script src="js/inventario.js"></script>
  </body>
</html>
