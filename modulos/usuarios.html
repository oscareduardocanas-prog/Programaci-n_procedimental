<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
  />
  <link rel="stylesheet" href="../css/usuario.css" />
    <title>Usuarios</title>
</head>
<body>
  <nav class="navbar" role="navigation">
    <div class="navbar-bran"><h2 class="title is-1">Usuarios</h2></div>
    <div class="navbar-end">
    <a class="navbar-item" href="../index.html" >
      Mi tierra querida
    </a>
    </div>
  </nav>
  <div class="container">
      <div class="field">
        <label class="label">Nombre Completo</label>
        <div class="control">
          <input class="input" type="text" id="nombre_completo" placeholder="ingrese el nombre completo de usuario" required>
        </div>
     </div>

    <div class="field">
        <label class="label">Email</label>
        <div class="control">
          <input class="input" type="email" id="email" placeholder="ingrese el correo electrónico de usuario" required>
        </div>
    </div>
    
    <div class="field">
        <label class="label">Numero celular</label>
        <div class="control">
          <input class="input" type="number" id="numero_celular" placeholder="ingrese el numero de celular de usuario" required>
        </div>
    </div>

    <div class="field">
        <label class="label">Genero</label>
        <div class="control">
          <input class="input" type="text" id="genero"  placeholder="ingrese el genero de usuario" required>
        </div>
    </div>

    <div class="field">
        <label class="label">Fecha de nacimiento</label>
        <div class="control">
          <input class="input" type="date" id="fecha_nacimiento" placeholder="ingrese la fecha de nacimiento de usuario" required>
        </div>
    </div>

    <div class="field">
        <label class="label">Dirección</label>
        <div class="control">
          <input class="input" type="text" id="direccion" placeholder="ingrese la dirección de usuario" required>
        </div>
    </div>

    <div class="field">
        <label class="label">Contraseña</label>
        <div class="control">
          <input class="input" type="password" id="contraseña" placeholder="ingrese la contraseña de usuario" required>
        </div>
    </div>

  </div>
  <script src="js/usuarios.js"></script>
</body>
</html>
